<!DOCTYPE html>
<html>
<head>
    <title>Mission Control Dashboard - Bulletproof</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Minimal CSS to avoid any conflicts */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background: #0f172a;
            color: #f8fafc;
        }
        
        .header {
            background: #1e293b;
            padding: 15px 20px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2563eb;
        }
        
        .connection {
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .connected { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .disconnected { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        
        .main {
            padding: 20px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #334155;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }
        
        .agent-card {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #334155;
        }
        
        .agent-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .active { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .inactive { background: rgba(148, 163, 184, 0.2); color: #94a3b8; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🚀 Mission Control</div>
        <div class="connection disconnected" id="connectionStatus">
            <span>●</span> Disconnected
        </div>
    </div>
    
    <div class="main">
        <h1>Dashboard Overview</h1>
        
        <div class="stats">
            <div class="stat-card">
                <div>Active Agents</div>
                <div class="stat-value" id="activeCount">0</div>
                <div style="color: #10b981;">+12% from yesterday</div>
            </div>
            
            <div class="stat-card">
                <div>Tasks Completed</div>
                <div class="stat-value" id="tasksCount">0</div>
                <div style="color: #10b981;">+8% this week</div>
            </div>
            
            <div class="stat-card">
                <div>Memory Usage</div>
                <div class="stat-value" id="memoryUsage">0 MB</div>
                <div style="color: #ef4444;">+3% increase</div>
            </div>
            
            <div class="stat-card">
                <div>Response Time</div>
                <div class="stat-value" id="responseTime">0ms</div>
                <div style="color: #10b981;">-5% improvement</div>
            </div>
        </div>
        
        <h2>Agent Status</h2>
        <div class="agents-grid" id="agentsGrid">
            <!-- Agents will be loaded here -->
            <div class="agent-card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h3 style="margin: 0;">Loading...</h3>
                        <div style="color: #94a3b8;">Loading role</div>
                    </div>
                    <span class="agent-status inactive">Loading</span>
                </div>
                <div style="margin-top: 15px; display: grid; grid-template-columns: repeat(3, 1fr); text-align: center;">
                    <div>
                        <div style="font-size: 1.2rem; font-weight: bold;">0</div>
                        <div style="font-size: 0.8rem; color: #94a3b8;">Tasks</div>
                    </div>
                    <div>
                        <div style="font-size: 1.2rem; font-weight: bold;">0</div>
                        <div style="font-size: 0.8rem; color: #94a3b8;">Activities</div>
                    </div>
                    <div>
                        <div style="font-size: 1.2rem; font-weight: bold;">0%</div>
                        <div style="font-size: 0.8rem; color: #94a3b8;">CPU</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Wait for DOM to be fully loaded
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 DOM loaded, starting dashboard...');
            
            // Simple Dashboard Class
            class SimpleDashboard {
                constructor() {
                    this.ws = null;
                    this.agents = [];
                    this.isConnected = false;
                    console.log('📊 Dashboard instance created');
                }
                
                init() {
                    console.log('🔧 Initializing dashboard...');
                    this.connectWebSocket();
                    this.loadAgents();
                }
                
                connectWebSocket() {
                    console.log('🔌 Attempting WebSocket connection...');
                    this.updateConnectionStatus(false);
                    
                    // Close existing connection if any
                    if (this.ws) {
                        this.ws.close();
                    }
                    
                    // Try multiple WebSocket URLs
                    const urls = [
                        'ws://localhost:3000',
                        'ws://127.0.0.1:3000'
                    ];
                    
                    let currentUrlIndex = 0;
                    
                    const tryConnect = () => {
                        if (currentUrlIndex >= urls.length) {
                            console.error('❌ All WebSocket URLs failed');
                            return;
                        }
                        
                        const url = urls[currentUrlIndex];
                        console.log(`Trying WebSocket: ${url}`);
                        
                        try {
                            this.ws = new WebSocket(url);
                            
                            this.ws.onopen = () => {
                                console.log(`✅ WebSocket connected to ${url}`);
                                this.isConnected = true;
                                this.updateConnectionStatus(true);
                                currentUrlIndex = 0; // Reset for reconnections
                                
                                // Send subscription
                                setTimeout(() => {
                                    if (this.ws && this.ws.readyState === WebSocket.OPEN) {
                                        this.ws.send(JSON.stringify({
                                            type: 'subscribe',
                                            timestamp: new Date().toISOString()
                                        }));
                                        console.log('📤 Sent subscription');
                                    }
                                }, 500);
                            };
                            
                            this.ws.onmessage = (event) => {
                                console.log('📨 WebSocket message received');
                                try {
                                    const data = JSON.parse(event.data);
                                    console.log(`Message type: ${data.type}`);
                                    
                                    if (data.type === 'connection_established') {
                                        console.log('✅ Server connection confirmed');
                                    } else if (data.type === 'agent_status_updated') {
                                        console.log('🔄 Agent update received');
                                        this.loadAgents(); // Refresh agents
                                    }
                                } catch (e) {
                                    console.log('Raw message:', event.data);
                                }
                            };
                            
                            this.ws.onclose = () => {
                                console.log('❌ WebSocket closed');
                                this.isConnected = false;
                                this.updateConnectionStatus(false);
                                
                                // Try to reconnect
                                currentUrlIndex++;
                                setTimeout(tryConnect, 2000);
                            };
                            
                            this.ws.onerror = (error) => {
                                console.error('❌ WebSocket error:', error);
                                this.isConnected = false;
                                this.updateConnectionStatus(false);
                                currentUrlIndex++;
                                setTimeout(tryConnect, 2000);
                            };
                            
                        } catch (error) {
                            console.error('❌ Failed to create WebSocket:', error);
                            currentUrlIndex++;
                            setTimeout(tryConnect, 2000);
                        }
                    };
                    
                    tryConnect();
                }
                
                updateConnectionStatus(connected) {
                    const statusElement = document.getElementById('connectionStatus');
                    if (statusElement) {
                        if (connected) {
                            statusElement.className = 'connection connected';
                            statusElement.innerHTML = '<span>●</span> Connected';
                        } else {
                            statusElement.className = 'connection disconnected';
                            statusElement.innerHTML = '<span>●</span> Disconnected';
                        }
                    }
                }
                
                async loadAgents() {
                    console.log('📡 Loading agents from API...');
                    
                    try {
                        const response = await fetch('/api/agents');
                        
                        if (!response.ok) {
                            throw new Error(`HTTP ${response.status}`);
                        }
                        
                        const data = await response.json();
                        
                        if (data.success && data.agents) {
                            this.agents = data.agents;
                            console.log(`✅ Loaded ${this.agents.length} agents`);
                            this.renderAgents();
                            this.updateStats();
                        } else {
                            throw new Error('Invalid API response');
                        }
                        
                    } catch (error) {
                        console.error('❌ Failed to load agents:', error);
                        console.log('🔄 Using mock data as fallback');
                        
                        // Fallback to mock data
                        this.agents = this.getMockAgents();
                        this.renderAgents();
                        this.updateStats();
                    }
                }
                
                renderAgents() {
                    const grid = document.getElementById('agentsGrid');
                    if (!grid) {
                        console.error('❌ agentsGrid element not found');
                        return;
                    }
                    
                    // Clear existing content
                    grid.innerHTML = '';
                    
                    // Render each agent
                    this.agents.forEach(agent => {
                        const card = document.createElement('div');
                        card.className = 'agent-card';
                        
                        const statusClass = agent.status === 'active' ? 'active' : 'inactive';
                        const tasks = Math.floor(Math.random() * 10);
                        const activities = Math.floor(Math.random() * 20);
                        const cpu = Math.floor(Math.random() * 30) + 10;
                        
                        card.innerHTML = `
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <div>
                                    <h3 style="margin: 0;">${agent.name}</h3>
                                    <div style="color: #94a3b8;">${agent.role}</div>
                                </div>
                                <span class="agent-status ${statusClass}">${agent.status}</span>
                            </div>
                            <div style="margin-top: 15px; display: grid; grid-template-columns: repeat(3, 1fr); text-align: center;">
                                <div>
                                    <div style="font-size: 1.2rem; font-weight: bold;">${tasks}</div>
                                    <div style="font-size: 0.8rem; color: #94a3b8;">Tasks</div>
                                </div>
                                <div>
                                    <div style="font-size: 1.2rem; font-weight: bold;">${activities}</div>
                                    <div style="font-size: 0.8rem; color: #94a3b8;">Activities</div>
                                </div>
                                <div>
                                    <div style="font-size: 1.2rem; font-weight: bold;">${cpu}%</div>
                                    <div style="font-size: 0.8rem; color: #94a3b8;">CPU</div>
                                </div>
                            </div>
                        `;
                        
                        grid.appendChild(card);
                    });
                    
                    console.log(`✅ Rendered ${this.agents.length} agents`);
                }
                
                updateStats() {
                    const activeCount = this.agents.filter(a => a.status === 'active').length;
                    const tasksCount = Math.floor(Math.random() * 50) + 20;
                    
                    document.getElementById('activeCount').textContent = activeCount;
                    document.getElementById('tasksCount').textContent = tasksCount;
                    document.getElementById('memoryUsage').textContent = '24.5 MB';
                    document.getElementById('responseTime').textContent = '142ms';
                    
                    console.log(`📊 Stats updated: ${activeCount} active agents`);
                }
                
                getMockAgents() {
                    return [
                        { id: '1', name: 'Lui', role: 'COO / Orchestrator', status: 'active' },
                        { id: '2', name: 'Warren', role: 'Strategy Chief', status: 'active' },
                        { id: '3', name: 'Elon', role: 'CTO', status: 'active' },
                        { id: '4', name: 'Brains', role: 'CMO', status: 'active' },
                        { id: '5', name: 'Lens', role: 'Media Producer', status: 'active' },
                        { id: '6', name: 'Buzz', role: 'CCO', status: 'active' },
                        { id: '7', name: 'Goldie', role: 'Marketing Chief', status: 'active' },
                        { id: '8', name: 'June', role: 'Life Manager', status: 'active' }
                    ];
                }
            }
            
            // Initialize the dashboard
            try {
                window.dashboard = new SimpleDashboard();
                window.dashboard.init();
                console.log('✅ Dashboard initialized successfully');
            } catch (error) {
                console.error('❌ Failed to initialize dashboard:', error);
                alert('Dashboard initialization failed. Check console for details.');
            }
        });
    </script>
</body>
</html>
