<!DOCTYPE html>
<html>
<head>
    <title>Simple Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .tab { padding: 10px; background: #eee; margin: 5px; display: inline-block; cursor: pointer; }
        .tab.active { background: #007bff; color: white; }
        .page { display: none; padding: 20px; border: 1px solid #ccc; margin-top: 10px; }
        .page.active { display: block; }
    </style>
</head>
<body>
    <h1>Simple Tab Test</h1>
    
    <div>
        <div class="tab active" data-page="page1">Page 1</div>
        <div class="tab" data-page="page2">Page 2</div>
        <div class="tab" data-page="page3">Page 3</div>
    </div>
    
    <div id="page1" class="page active">
        <h2>Page 1 Content</h2>
        <p>This is page 1. Tabs should work.</p>
        <button onclick="testAPI()">Test API</button>
        <div id="apiResult"></div>
    </div>
    
    <div id="page2" class="page">
        <h2>Page 2 Content</h2>
        <p>This is page 2.</p>
    </div>
    
    <div id="page3" class="page">
        <h2>Page 3 Content</h2>
        <p>This is page 3.</p>
    </div>
    
    <script>
        // Simple tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                // Remove active from all tabs
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                
                // Add active to clicked tab
                tab.classList.add('active');
                
                // Show corresponding page
                const pageId = tab.dataset.page;
                document.getElementById(pageId).classList.add('active');
            });
        });
        
        async function testAPI() {
            try {
                const response = await fetch('/api/agents');
                const data = await response.json();
                document.getElementById('apiResult').innerHTML = 
                    `<pre>API Success! Found ${data.count} agents</pre>`;
            } catch (error) {
                document.getElementById('apiResult').innerHTML = 
                    `<pre style="color: red;">API Error: ${error.message}</pre>`;
            }
        }
    </script>
</body>
</html>
