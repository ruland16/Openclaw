<!DOCTYPE html>
<html>
<head>
    <title>Debug WebSocket</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        #log { background: #f0f0f0; padding: 10px; margin: 10px 0; height: 400px; overflow-y: auto; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>WebSocket Debug Test</h1>
    <div>
        <button onclick="testOriginal()">Test Original Dashboard Code</button>
        <button onclick="testSimple()">Test Simple Connection</button>
    </div>
    <div id="log"></div>
    
    <script>
        const log = document.getElementById('log');
        
        function addLog(message, className = '') {
            const entry = document.createElement('div');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            if (className) entry.className = className;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }
        
        function testOriginal() {
            addLog('Testing original dashboard WebSocket code...');
            
            // Simulate the original dashboard code
            const wsUrl = `ws://${window.location.host}`;
            addLog(`WebSocket URL: ${wsUrl}`);
            
            try {
                const ws = new WebSocket(wsUrl);
                
                ws.onopen = () => {
                    addLog('✅ WebSocket opened successfully', 'success');
                    addLog(`WebSocket readyState: ${ws.readyState} (OPEN = 1)`);
                    
                    // Send test message
                    ws.send(JSON.stringify({ type: 'test' }));
                };
                
                ws.onmessage = (event) => {
                    addLog(`📨 Received: ${event.data}`);
                };
                
                ws.onclose = (event) => {
                    addLog(`❌ WebSocket closed: code=${event.code}, reason=${event.reason}`);
                };
                
                ws.onerror = (error) => {
                    addLog(`❌ WebSocket error: ${error.type}`, 'error');
                };
                
                // Check readyState after a delay
                setTimeout(() => {
                    addLog(`After 2s, readyState: ${ws.readyState}`);
                    if (ws.readyState !== WebSocket.OPEN) {
                        addLog('WebSocket failed to open within 2 seconds', 'error');
                    }
                }, 2000);
                
            } catch (error) {
                addLog(`❌ Exception: ${error.message}`, 'error');
            }
        }
        
        function testSimple() {
            addLog('Testing simple WebSocket connection...');
            
            const ws = new WebSocket('ws://localhost:3000');
            
            ws.onopen = () => {
                addLog('✅ Simple connection opened', 'success');
                ws.send(JSON.stringify({ type: 'hello' }));
            };
            
            ws.onmessage = (event) => {
                addLog(`📨 Simple received: ${event.data}`);
            };
            
            ws.onerror = (error) => {
                addLog(`❌ Simple connection error`, 'error');
            };
        }
        
        // Test on load
        window.addEventListener('load', () => {
            addLog('Page loaded');
            addLog(`window.location.host: ${window.location.host}`);
            addLog(`window.location.hostname: ${window.location.hostname}`);
            addLog(`window.location.port: ${window.location.port}`);
        });
    </script>
</body>
</html>
