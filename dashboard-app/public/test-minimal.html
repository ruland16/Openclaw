<!DOCTYPE html>
<html>
<head>
    <title>Mission Control - Minimal Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #0f172a; color: white; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; font-weight: bold; }
        .connected { background: #10b981; }
        .disconnected { background: #ef4444; }
        .card { background: #1e293b; padding: 20px; border-radius: 10px; margin: 20px 0; border: 1px solid #334155; }
        .agent { display: inline-block; background: #2563eb; color: white; padding: 10px; margin: 5px; border-radius: 5px; }
        .log { background: #1e293b; padding: 10px; border-radius: 5px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <h1>🚀 Mission Control - Minimal Test</h1>
    
    <div class="status disconnected" id="status">Status: Disconnected</div>
    
    <button onclick="connectWebSocket()">Connect WebSocket</button>
    <button onclick="loadAgents()">Load Agents</button>
    <button onclick="clearLog()">Clear Log</button>
    
    <div class="card">
        <h3>Agents (API Test)</h3>
        <div id="agents"></div>
    </div>
    
    <div class="card">
        <h3>WebSocket Log</h3>
        <div class="log" id="log"></div>
    </div>
    
    <script>
        let ws = null;
        const log = document.getElementById('log');
        const status = document.getElementById('status');
        
        function addLog(message) {
            const entry = document.createElement('div');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }
        
        function clearLog() {
            log.innerHTML = '';
        }
        
        function updateStatus(connected) {
            status.textContent = `Status: ${connected ? 'Connected' : 'Disconnected'}`;
            status.className = `status ${connected ? 'connected' : 'disconnected'}`;
        }
        
        function connectWebSocket() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                addLog('WebSocket already connected');
                return;
            }
            
            addLog('Connecting to WebSocket...');
            updateStatus(false);
            
            // Try multiple WebSocket URLs
            const urls = [
                'ws://localhost:3000',
                'ws://127.0.0.1:3000'
            ];
            
            let currentUrl = 0;
            
            function tryConnect() {
                if (currentUrl >= urls.length) {
                    addLog('All WebSocket URLs failed');
                    return;
                }
                
                const url = urls[currentUrl];
                addLog(`Trying: ${url}`);
                
                try {
                    ws = new WebSocket(url);
                    
                    ws.onopen = () => {
                        addLog(`✅ CONNECTED to ${url}`);
                        updateStatus(true);
                        
                        // Send test message
                        ws.send(JSON.stringify({
                            type: 'ping',
                            message: 'Hello from minimal test',
                            timestamp: new Date().toISOString()
                        }));
                        
                        addLog('Sent ping message');
                    };
                    
                    ws.onmessage = (event) => {
                        try {
                            const data = JSON.parse(event.data);
                            addLog(`📨 Received: ${data.type}`);
                            if (data.message) addLog(`   Message: ${data.message}`);
                        } catch (e) {
                            addLog(`📨 Received raw: ${event.data}`);
                        }
                    };
                    
                    ws.onclose = () => {
                        addLog('❌ WebSocket closed');
                        updateStatus(false);
                        // Try next URL
                        currentUrl++;
                        setTimeout(tryConnect, 1000);
                    };
                    
                    ws.onerror = (error) => {
                        addLog(`❌ WebSocket error for ${url}`);
                        updateStatus(false);
                        // Try next URL
                        currentUrl++;
                        setTimeout(tryConnect, 1000);
                    };
                    
                } catch (error) {
                    addLog(`❌ Failed to create WebSocket: ${error}`);
                    currentUrl++;
                    setTimeout(tryConnect, 1000);
                }
            }
            
            tryConnect();
        }
        
        async function loadAgents() {
            addLog('Loading agents from API...');
            try {
                const response = await fetch('/api/agents');
                const data = await response.json();
                addLog(`✅ Loaded ${data.count} agents`);
                
                const agentsDiv = document.getElementById('agents');
                agentsDiv.innerHTML = '';
                
                data.agents.forEach(agent => {
                    const agentDiv = document.createElement('div');
                    agentDiv.className = 'agent';
                    agentDiv.innerHTML = `
                        <strong>${agent.name}</strong><br>
                        <small>${agent.role}</small><br>
                        <small>Status: ${agent.status}</small>
                    `;
                    agentsDiv.appendChild(agentDiv);
                });
            } catch (error) {
                addLog(`❌ Failed to load agents: ${error}`);
            }
        }
        
        // Auto-connect on page load
        window.addEventListener('load', () => {
            addLog('Page loaded - auto-connecting...');
            connectWebSocket();
            setTimeout(loadAgents, 1000);
        });
    </script>
</body>
</html>
