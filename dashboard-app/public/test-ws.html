<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .connected { background: #d4edda; color: #155724; }
        .disconnected { background: #f8d7da; color: #721c24; }
        #log { background: #f8f9fa; padding: 10px; border: 1px solid #ddd; height: 300px; overflow-y: auto; }
        .log-entry { margin: 5px 0; padding: 5px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <h1>WebSocket Connection Test</h1>
    <div id="status" class="disconnected">Status: Disconnected</div>
    <button onclick="connectWebSocket()">Connect</button>
    <button onclick="sendTestMessage()">Send Test Message</button>
    <button onclick="clearLog()">Clear Log</button>
    
    <h3>Connection Log:</h3>
    <div id="log"></div>
    
    <script>
        let ws = null;
        const log = document.getElementById('log');
        const status = document.getElementById('status');
        
        function addLog(message) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }
        
        function clearLog() {
            log.innerHTML = '';
        }
        
        function updateStatus(connected) {
            status.textContent = `Status: ${connected ? 'Connected' : 'Disconnected'}`;
            status.className = connected ? 'connected' : 'disconnected';
        }
        
        function connectWebSocket() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                addLog('WebSocket already connected');
                return;
            }
            
            const wsUrl = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
            const fullUrl = wsUrl + window.location.host;
            
            addLog(`Connecting to ${fullUrl}...`);
            
            try {
                ws = new WebSocket(fullUrl);
                
                ws.onopen = () => {
                    addLog('WebSocket connected successfully!');
                    updateStatus(true);
                    
                    // Send subscription message
                    ws.send(JSON.stringify({
                        type: 'subscribe',
                        channels: ['agents', 'tasks', 'activities', 'metrics']
                    }));
                    addLog('Sent subscription request');
                };
                
                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        addLog(`Received: ${data.type || 'message'} - ${JSON.stringify(data).substring(0, 100)}...`);
                    } catch (e) {
                        addLog(`Received: ${event.data.substring(0, 100)}...`);
                    }
                };
                
                ws.onclose = () => {
                    addLog('WebSocket disconnected');
                    updateStatus(false);
                };
                
                ws.onerror = (error) => {
                    addLog(`WebSocket error: ${error}`);
                    updateStatus(false);
                };
                
            } catch (error) {
                addLog(`Failed to create WebSocket: ${error}`);
            }
        }
        
        function sendTestMessage() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addLog('Cannot send: WebSocket not connected');
                return;
            }
            
            const testMessage = {
                type: 'test',
                message: 'Hello from test client',
                timestamp: new Date().toISOString()
            };
            
            ws.send(JSON.stringify(testMessage));
            addLog('Sent test message');
        }
        
        // Auto-connect after 1 second
        setTimeout(connectWebSocket, 1000);
    </script>
</body>
</html>
