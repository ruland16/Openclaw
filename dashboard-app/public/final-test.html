<!DOCTYPE html>
<html>
<head>
    <title>Final WebSocket Test</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        #log { background: #f0f0f0; padding: 10px; margin: 10px 0; height: 500px; overflow-y: auto; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Final WebSocket Connection Test</h1>
    <div id="status">Not connected</div>
    <button onclick="connect()">Connect</button>
    <div id="log"></div>
    
    <script>
        const log = document.getElementById('log');
        const status = document.getElementById('status');
        let ws = null;
        
        function addLog(msg, className = '') {
            const div = document.createElement('div');
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            if (className) div.className = className;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
            console.log(msg);
        }
        
        function connect() {
            addLog('Attempting WebSocket connection...');
            status.textContent = 'Connecting...';
            status.style.color = 'orange';
            
            if (ws) {
                ws.close();
            }
            
            // Try the exact URL from simple-dashboard.html
            const url = 'ws://localhost:3000';
            addLog(`Creating WebSocket to: ${url}`);
            
            try {
                ws = new WebSocket(url);
                
                ws.onopen = function() {
                    addLog('✅ WebSocket onopen fired!', 'success');
                    status.textContent = 'Connected (onopen)';
                    status.style.color = 'green';
                    
                    // Send a test message
                    ws.send(JSON.stringify({
                        type: 'test',
                        message: 'Hello from browser'
                    }));
                };
                
                ws.onmessage = function(event) {
                    addLog(`📨 Message received: ${event.data}`);
                    
                    try {
                        const data = JSON.parse(event.data);
                        if (data.type === 'connection_established') {
                            addLog('✅ Server sent connection_established', 'success');
                            status.textContent = 'Connected (server confirmed)';
                            status.style.color = 'green';
                        }
                    } catch (e) {
                        // Not JSON
                    }
                };
                
                ws.onclose = function(event) {
                    addLog(`❌ WebSocket closed: code=${event.code}, reason=${event.reason}`, 'error');
                    status.textContent = `Disconnected (code: ${event.code})`;
                    status.style.color = 'red';
                };
                
                ws.onerror = function(error) {
                    addLog('❌ WebSocket error occurred', 'error');
                    status.textContent = 'Connection error';
                    status.style.color = 'red';
                };
                
            } catch (error) {
                addLog(`❌ Failed to create WebSocket: ${error.message}`, 'error');
                status.textContent = 'Failed to create connection';
                status.style.color = 'red';
            }
        }
        
        // Auto-connect on load
        window.addEventListener('load', () => {
            addLog('Page loaded');
            setTimeout(connect, 1000);
        });
    </script>
</body>
</html>
