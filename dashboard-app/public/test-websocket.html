<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        .log { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
    </style>
</head>
<body>
    <h1>WebSocket Connection Test</h1>
    <div>
        <button onclick="testWebSocket()">Test WebSocket Connection</button>
        <button onclick="testAPI()">Test API Endpoints</button>
        <button onclick="clearLog()">Clear Log</button>
    </div>
    
    <div id="log" class="log"></div>
    
    <script>
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = type;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            console.log(`[${type.toUpperCase()}] ${message}`);
        }
        
        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }
        
        async function testAPI() {
            log('Testing API endpoints...');
            
            try {
                // Test /api/agents
                const response = await fetch('/api/agents');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                log(`✅ API /api/agents: Success, got ${data.count} agents`, 'success');
                
                // Test /health
                const healthResponse = await fetch('/health');
                const healthData = await healthResponse.json();
                log(`✅ Health check: ${healthData.status}, ${healthData.websocket_clients} WS clients`, 'success');
                
            } catch (error) {
                log(`❌ API test failed: ${error.message}`, 'error');
            }
        }
        
        function testWebSocket() {
            log('Testing WebSocket connection...');
            
            // Clear any existing connection
            if (window.testWs) {
                window.testWs.close();
                window.testWs = null;
            }
            
            const wsUrl = 'ws://localhost:3000';
            log(`Connecting to ${wsUrl}...`);
            
            try {
                window.testWs = new WebSocket(wsUrl);
                
                window.testWs.onopen = () => {
                    log('✅ WebSocket connection opened successfully!', 'success');
                    
                    // Send a test message
                    setTimeout(() => {
                        window.testWs.send(JSON.stringify({
                            type: 'ping',
                            timestamp: new Date().toISOString()
                        }));
                        log('Sent ping message');
                    }, 500);
                };
                
                window.testWs.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        log(`📨 Received: ${data.type}`, 'success');
                        
                        if (data.type === 'connection_established') {
                            log(`✅ Connection established: ${data.message}`, 'success');
                        } else if (data.type === 'pong') {
                            log('🏓 Received pong response', 'success');
                        }
                    } catch (e) {
                        log(`📨 Raw message: ${event.data}`);
                    }
                };
                
                window.testWs.onclose = (event) => {
                    log(`❌ WebSocket closed: ${event.code} ${event.reason || ''}`, 'error');
                };
                
                window.testWs.onerror = (error) => {
                    log(`❌ WebSocket error: ${error}`, 'error');
                };
                
            } catch (error) {
                log(`❌ Failed to create WebSocket: ${error.message}`, 'error');
            }
        }
        
        // Auto-test on load
        window.addEventListener('load', () => {
            log('Page loaded. Click buttons to test.');
            testAPI(); // Auto-test API on load
        });
    </script>
</body>
</html>
