<!DOCTYPE html>
<html>
<head>
    <title>OpenClaw Mission Control</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 36px;
            margin-bottom: 10px;
            color: #2563eb;
        }
        
        .subtitle {
            font-size: 18px;
            color: #94a3b8;
            margin-bottom: 40px;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }
        
        .link {
            display: block;
            padding: 15px 25px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #f8fafc;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .link:hover {
            background: #2563eb;
            border-color: #2563eb;
            transform: translateY(-2px);
        }
        
        .link-primary {
            background: #2563eb;
            border-color: #2563eb;
        }
        
        .link-primary:hover {
            background: #1d4ed8;
        }
        
        .api-info {
            margin-top: 40px;
            padding: 20px;
            background: #1e293b;
            border-radius: 10px;
            border: 1px solid #334155;
            text-align: left;
        }
        
        .api-info h3 {
            margin-top: 0;
            color: #2563eb;
        }
        
        .api-endpoint {
            font-family: monospace;
            background: #0f172a;
            padding: 8px 12px;
            border-radius: 6px;
            margin: 5px 0;
            display: block;
            color: #10b981;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🦞</div>
        <h1>OpenClaw Mission Control</h1>
        <div class="subtitle">Multi-agent orchestration dashboard</div>
        
        <div class="links">
            <a href="/mission-control-final.html" class="link link-primary">
                🚀 Launch Mission Control Dashboard
            </a>
            <a href="/dashboard-new.html" class="link">
                📊 Simple Dashboard (Fallback)
            </a>
            <a href="/test-simple.html" class="link">
                🧪 Test Page
            </a>
        </div>
        
        <div class="api-info">
            <h3>Available APIs</h3>
            <div class="api-endpoint">GET /api/agents</div>
            <div class="api-endpoint">GET /api/tasks</div>
            <div class="api-endpoint">GET /api/memory/activities</div>
            <div class="api-endpoint">GET /api/metrics</div>
            <div class="api-endpoint">WS / (WebSocket for real-time updates)</div>
        </div>
    </div>
</body>
</html>
